<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Omnibug_SLS</title>
    <link rel="stylesheet" href="popup.css" />
</head>
<body>

    <header>
        <div class="brand">
            <img src="../assets/images/blue-32.png" alt="" width="20" height="20" />
            <span>Omnibug_SLS</span>
        </div>
        <div class="actions">
            <button id="btn-expand" title="Toggle expanded view" aria-label="Expand">
                <svg id="expand-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path d="M4 4h7v2H6v5H4V4zm9 0h7v7h-2V6h-5V4zm7 9v7h-7v-2h5v-5h2zM4 13h2v5h5v2H4v-7z"/>
                </svg>
            </button>
            <button id="btn-theme" title="Toggle theme" aria-label="Toggle theme">
                <svg id="theme-icon-light" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0c-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0c-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41a.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41a.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
                </svg>
                <svg id="theme-icon-dark" viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="display:none">
                    <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
                </svg>
            </button>
            <button id="btn-add-endpoint" title="Add a GA4 server-side endpoint" aria-label="Add endpoint">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
            </button>
            <button id="btn-clear" title="Clear history" aria-label="Clear history">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path d="M3 6h18v2H3V6zm3 3h12l-1 11H7L6 9zm4-6h4v2h-4V3z"/>
                </svg>
            </button>
            <button id="btn-settings" title="Open settings" aria-label="Open settings">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94 0 .31.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
            </button>
        </div>
    </header>

    <div class="tabs" role="tablist">
        <button class="tab active" data-mode="all" role="tab" aria-selected="true">
            All <span class="tab-count" id="count-all">0</span>
        </button>
        <button class="tab" data-mode="hits" role="tab" aria-selected="false">
            Hits <span class="tab-count" id="count-hits">0</span>
        </button>
        <button class="tab" data-mode="datalayer" role="tab" aria-selected="false">
            dataLayer <span class="tab-count" id="count-dl">0</span>
        </button>
        <button class="tab tab-debug" data-mode="debug" role="tab" aria-selected="false" title="Diagnostic view">
            🔧 Debug <span class="tab-count" id="count-debug">0</span>
        </button>
    </div>

    <div class="toolbar">
        <input type="search" id="filter" placeholder="Filter by provider, event, parameter…" />
        <button id="btn-sort" class="sort-btn" title="Toggle sort order (newest first)" aria-label="Toggle sort order">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                <path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/>
            </svg>
            <span id="sort-label">Newest</span>
        </button>
    </div>

    <div id="quick-add" class="quick-add hidden">
        <div class="quick-add-label">Add this domain as a GA4 server-side endpoint:</div>
        <div class="quick-add-row">
            <input type="text" id="quick-add-input" placeholder="e.g. sgtm.mysite.com/track" />
            <button id="quick-add-save" class="quick-add-btn primary">Add</button>
            <button id="quick-add-cancel" class="quick-add-btn">Cancel</button>
        </div>
        <div class="quick-add-help">Once added, matching requests on any page will be captured as GA4 hits.</div>
    </div>

    <div id="provider-filter-bar" class="provider-filter-bar hidden">
        <label for="provider-select">Provider:</label>
        <select id="provider-select">
            <option value="all">All providers</option>
        </select>
        <label for="container-select">Container:</label>
        <select id="container-select">
            <option value="all">All</option>
        </select>
        <button id="btn-toggle-noise" class="noise-toggle" title="Show/hide GA4 probe hits (heartbeats with no event)" aria-label="Toggle noise">
            <span class="noise-toggle-label">Hide noise</span>
            <span id="noise-count" class="noise-count">0</span>
        </button>
    </div>

    <div id="empty-state" class="empty">
        <div class="empty-icon">
            <svg viewBox="0 0 24 24" width="40" height="40" fill="currentColor" opacity="0.3">
                <path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 001.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 00-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 005.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
        </div>
        <p class="empty-title">No events captured yet</p>
        <p class="empty-help">Navigate on the page or trigger an event. Captured requests and dataLayer pushes will appear here.</p>
    </div>

    <ul id="timeline" class="timeline"></ul>

    <footer>
        <span id="status" class="status">Listening…</span>
        <a href="https://www.linkedin.com/in/assalas-arab/" target="_blank" rel="noopener noreferrer" class="credit">
            Dev by Assalas Arab
        </a>
    </footer>

    <div id="resize-handle" class="resize-handle" title="Drag to resize"></div>

    <script src="popup.js"></script>
</body>
</html>
